<div class="sidebar" [class.sidebar-hidden]="!isOpen">
  <div class="sidebar-logo">
    <div class="logo-icon"><i class="bi bi-heart-pulse-fill"></i></div>
    <span class="logo-text">MedTrack</span>
  </div>

  <div class="sidebar-section">
    <span class="section-label">MENU</span>
    <ul class="menu-list">

      <li>
        <a routerLink="/dashboard" routerLinkActive="active" class="menu-item">
          <i class="bi bi-speedometer2"></i><span>Dashboard</span>
        </a>
      </li>

      <!-- Admin et Médecin voient patients -->
      <li *ngIf="!roleService.isInfirmier()">
        <a routerLink="/patients" routerLinkActive="active" class="menu-item">
          <i class="bi bi-people-fill"></i><span>Patients</span>
        </a>
      </li>

      <!-- Infirmier voit ses patients assignés -->
      <li *ngIf="roleService.isInfirmier()">
        <a routerLink="/patients" routerLinkActive="active" class="menu-item">
          <i class="bi bi-people-fill"></i><span>Mes patients</span>
        </a>
      </li>

      <!-- Médecin seulement -->
      <ng-container *ngIf="roleService.isMedecin()">
        <li>
          <a routerLink="/consultations" routerLinkActive="active" class="menu-item">
            <i class="bi bi-clipboard2-pulse-fill"></i><span>Consultations</span>
          </a>
        </li>
        <li>
          <a routerLink="/examens" routerLinkActive="active" class="menu-item">
            <i class="bi bi-droplet-fill"></i><span>Examens</span>
          </a>
        </li>
        <li>
          <a routerLink="/resultats" routerLinkActive="active" class="menu-item">
            <i class="bi bi-file-medical-fill"></i><span>Résultats</span>
          </a>
        </li>
      </ng-container>

      <!-- Infirmier : soins seulement -->
      <li *ngIf="roleService.isInfirmier()">
        <a routerLink="/soins" routerLinkActive="active" class="menu-item">
          <i class="bi bi-heart-pulse-fill"></i><span>Soins</span>
        </a>
      </li>

      <!-- Médecin voit aussi les soins de ses patients -->
<li *ngIf="roleService.isMedecin()">
  <a routerLink="/soins" routerLinkActive="active" class="menu-item">
    <i class="bi bi-heart-pulse-fill"></i><span>Suivi des soins</span>
  </a>
</li>

      <!-- Admin voit tout -->
      <ng-container *ngIf="roleService.isAdmin()">
        <li>
          <a routerLink="/consultations" routerLinkActive="active" class="menu-item">
            <i class="bi bi-clipboard2-pulse-fill"></i><span>Consultations</span>
          </a>
        </li>
        <li>
          <a routerLink="/examens" routerLinkActive="active" class="menu-item">
            <i class="bi bi-droplet-fill"></i><span>Examens</span>
          </a>
        </li>
        <li>
          <a routerLink="/resultats" routerLinkActive="active" class="menu-item">
            <i class="bi bi-file-medical-fill"></i><span>Résultats</span>
          </a>
        </li>
        <li>
          <a routerLink="/soins" routerLinkActive="active" class="menu-item">
            <i class="bi bi-heart-pulse-fill"></i><span>Soins</span>
          </a>
        </li>
        <li class="menu-separator"></li>
        <li>
          <a routerLink="/admin/personnel" routerLinkActive="active" class="menu-item">
            <i class="bi bi-person-badge-fill"></i><span>Personnel</span>
          </a>
        </li>
        <li>
          <a routerLink="/admin/creer-personnel" routerLinkActive="active" class="menu-item">
            <i class="bi bi-person-plus-fill"></i><span>Créer un compte</span>
          </a>
        </li>
      </ng-container>

    </ul>
  </div>

  <div class="sidebar-section mt-auto">
    <span class="section-label">COMPTE</span>
    <ul class="menu-list">
      <li>
        <a routerLink="/profil" routerLinkActive="active" class="menu-item">
          <i class="bi bi-person-circle"></i><span>Mon profil</span>
        </a>
      </li>
      <li>
        <a class="menu-item logout-item" (click)="authService.logout()" style="cursor:pointer">
          <i class="bi bi-box-arrow-right"></i><span>Déconnexion</span>
        </a>
      </li>
    </ul>
  </div>
</div>
