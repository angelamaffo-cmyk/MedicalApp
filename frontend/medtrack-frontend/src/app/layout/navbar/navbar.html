<nav class="navbar-top">

  <button class="toggle-btn" (click)="onToggle()">
    <i class="bi bi-list"></i>
  </button>

  <div class="navbar-title">
    <h5>Tableau de bord</h5>
  </div>

  <div class="navbar-right">

    <!-- Toggle Dark Mode -->
    <button class="theme-toggle" (click)="toggleTheme()" [title]="isDarkMode ? 'Mode clair' : 'Mode sombre'">
      <i class="bi" [class.bi-moon-fill]="!isDarkMode" [class.bi-sun-fill]="isDarkMode"></i>
    </button>

    <!-- Notifications -->
    <button class="notif-btn">
      <i class="bi bi-bell"></i>
      <span class="notif-dot"></span>
    </button>

    <!-- Profil -->
    <a routerLink="/profil" class="profil-btn">
      <div class="profil-avatar">{{ getInitiales() }}</div>
      <div class="profil-info d-none d-md-flex">
        <span class="profil-nom">{{ profil?.nom_complet || 'Administrateur' }}</span>
        <span class="profil-role">{{ getRoleLabel() }}</span>
      </div>
    </a>

  </div>
</nav>
